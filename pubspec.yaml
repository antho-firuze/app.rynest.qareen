name: qareen
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  android_navigation_settings: ^0.0.3
  async: ^2.13.0
  avatar_glow: ^3.0.1
  camera: ^0.12.0+1
  carousel_slider: ^5.1.1
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.3.0
  dio: ^5.9.0
  envied: ^1.3.2
  flutter:
    sdk: flutter
  flutter_archive: ^6.0.4
  flutter_chat_core: ^2.9.0
  flutter_chat_ui: ^2.11.1
  flutter_hooks: ^0.21.3+1
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^22.0.0-dev.3
  flutter_riverpod: ^3.1.0
  flutter_spinkit: ^5.2.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_sticky_header: ^0.8.0
  flutter_timezone: ^5.0.1
  flutter_widget_from_html: ^0.17.1
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.0.1
  html: ^0.15.6
  image: ^4.7.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  network_info_plus: ^7.0.0
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  photo_manager: ^3.8.3
  photo_manager_image_provider: ^2.2.0
  riverpod_annotation: ^4.0.0
  scroll_to_index: ^3.0.1
  share_plus: ^12.0.2
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  sqflite: ^2.4.3
  staggered_grid_view_flutter: ^0.0.4
  super_icons: ^1.0.3
  talker_dio_logger: ^5.1.17
  talker_flutter: ^5.1.16
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  riverpod_lint: ^3.1.0
  envied_generator: ^1.3.2
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  icons_launcher: ^3.1.0
  custom_lint: ^0.8.1
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/menu/
    - assets/images/
    - assets/fonts/
    - assets/json/
    - assets/quran/
    - assets/quran/fonts/
    - assets/quran/icons/
    - assets/quran/images/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: Sana
      fonts:
        - asset: assets/fonts/Sana.ttc
    - family: Waseem
      fonts:
        - asset: assets/fonts/Waseem.ttc
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
    - family: diodrum
      fonts:
        - asset: assets/quran/fonts/DiodrumArabic-Regular.ttf
        - asset: assets/quran/fonts/DiodrumArabic-Medium.ttf
          weight: 500
        - asset: assets/quran/fonts/DiodrumArabic-Semibold.ttf
          weight: 600
        - asset: assets/quran/fonts/DiodrumArabic-Bold.ttf
          weight: 700
    - family: uthmanic
      fonts:
        - asset: assets/quran/fonts/UthmanicHafs-Regular.ttf
        - asset: assets/quran/fonts/UthmanicHafs-Bold.ttf
          weight: 700

icons_launcher:
  platforms:
    android:
      enable: true
      image_path: "assets/icons/app-icon.png"
    ios:
      enable: true
      image_path: "assets/icons/app-icon-ios.png"
